<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price - Gestão áXon</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans pb-20">

    <header class="bg-blue-900 p-6 text-center shadow-lg border-b-4 border-orange-500">
        <h1 class="text-3xl font-bold tracking-tighter">PRICE - GESTÃO ÁXON</h1>
        <p class="text-orange-400 text-sm font-semibold">Cálculo Estratégico de Lucro</p>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-6">
        
        <!-- SEÇÃO DE ESPIONAGEM -->
        <section class="bg-slate-800 p-5 rounded-2xl border-2 border-dashed border-orange-500 shadow-xl">
            <h2 class="text-orange-500 font-bold mb-3 flex items-center">🕵️ MODO ESPIONAGEM</h2>
            <p class="text-xs text-gray-400 mb-4">Descubra quanto o concorrente pagou no fornecedor:</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs uppercase font-bold text-gray-400 mb-1">Preço no Vizinho (R$)</label>
                    <input type="number" id="precoVizinho" placeholder="Ex: 18.90" class="w-full bg-slate-700 p-3 rounded-lg border border-slate-600 focus:outline-none focus:border-orange-500">
                </div>
                <button onclick="espiar()" class="w-full bg-orange-600 hover:bg-orange-700 p-3 rounded-lg font-bold transition-all shadow-lg active:scale-95">REVELAR CUSTO ESTIMADO</button>
                <div id="resultadoEspionagem" class="hidden bg-slate-900 p-4 rounded-xl border border-orange-900/50 text-center">
                    <p class="text-sm text-gray-400">O fornecedor dele deve ser:</p>
                    <p id="custoEstimado" class="text-2xl font-black text-orange-400"></p>
                </div>
            </div>
        </section>

        <!-- CALCULADORA PRINCIPAL -->
        <section class="bg-slate-800 p-6 rounded-3xl shadow-2xl space-y-4 border border-slate-700">
            <h2 class="text-blue-400 font-bold mb-2">CALCULADORA DE VENDA</h2>
            <div>
                <label class="block text-xs uppercase font-bold text-gray-400 mb-1">Custo do Fardo/Lote (R$)</label>
                <input type="number" id="custoLote" class="w-full bg-slate-700 p-4 rounded-xl text-xl focus:outline-none border-2 border-transparent focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs uppercase font-bold text-gray-400 mb-1">Unidades no Lote</label>
                <input type="number" id="unidades" value="1" class="w-full bg-slate-700 p-4 rounded-xl text-xl focus:outline-none border-2 border-transparent focus:border-blue-500">
            </div>
            <button onclick="calcular()" class="w-full bg-blue-600 hover:bg-blue-700 p-5 rounded-2xl font-black text-xl shadow-xl transition-all active:scale-95">CALCULAR PREÇO REAL</button>
        </section>

        <!-- RESULTADOS -->
        <div id="painelResultados" class="hidden space-y-4">
            <div class="bg-white text-slate-900 p-6 rounded-3xl shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-orange-500 text-white px-4 py-1 text-xs font-bold rounded-bl-xl">SUGESTÃO ÁXON</div>
                <p class="text-xs uppercase font-black text-gray-500">Preço de Venda Sugerido:</p>
                <p id="resVenda" class="text-5xl font-black text-blue-900 my-2"></p>
                <div class="border-t pt-4 mt-4 grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-[10px] uppercase font-bold text-gray-400">Lucro Real (25%)</p>
                        <p id="resLucro" class="font-bold text-green-600"></p>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase font-bold text-gray-400">Preço Mínimo (Promo)</p>
                        <p id="resMinimo" class="font-bold text-red-600"></p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        function espiar() {
            const preco = parseFloat(document.getElementById('precoVizinho').value);
            if (!preco) return;
            // Lógica reversa: assume-se que o vizinho coloca pelo menos 30% de margem total
            const estimado = preco / 1.35; 
            document.getElementById('resultadoEspionagem').classList.remove('hidden');
            document.getElementById('custoEstimado').innerText = 'R$ ' + estimado.toFixed(2);
        }

        function calcular() {
            const custoLote = parseFloat(document.getElementById('custoLote').value);
            const qtd = parseInt(document.getElementById('unidades').value);
            
            if (!custoLote || !qtd) return;

            const custoUnit = custoLote / qtd;
            const contribLoja = 3.25; // Baseado nos seus custos fixos
            const margemLucro = 0.25; // 25% de lucro real

            const precoMinimo = custoUnit + contribLoja;
            const precoVenda = precoMinimo / (1 - margemLucro);

            document.getElementById('painelResultados').classList.remove('hidden');
            document.getElementById('resVenda').innerText = 'R$ ' + precoVenda.toFixed(2);
            document.getElementById('resLucro').innerText = 'R$ ' + (precoVenda - precoMinimo).toFixed(2);
            document.getElementById('resMinimo').innerText = 'R$ ' + precoMinimo.toFixed(2);
        }

        // Registrar Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
